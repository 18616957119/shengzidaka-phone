    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="format-detection" content="telephone=no">

            color: #1d1d1f;
            line-height: 1.6;
            padding-bottom: 100px;
        }
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: rgba(255,255,255,0.95);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 1000;
        }
        .logo { font-size: 1em; font-weight: 700; color: #667eea; }
        .stats { display: flex; gap: 8px; }
        .stat { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 6px 12px; border-radius: 16px; font-size: 0.75em; font-weight: 600; }
        .container { max-width: 100%; margin: 0 auto; padding: 72px 12px 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .dash-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .dash-value { font-size: 2em; font-weight: 700; color: #667eea; }
        .dash-label { font-size: 0.7em; color: #6e6e73; margin-top: 4px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab { padding: 10px 16px; background: white; border: 2px solid #e0e0e8; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85em; white-space: nowrap; transition: all 0.3s; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-color: transparent; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .char-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e0e0e8; }
        .char-hanzi { font-size: 3.5em; font-weight: 700; color: #667eea; line-height: 1; }
        .mastery-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.7em; font-weight: 700; margin-left: auto; }
        .mastery-new { background: #e0e0e8; color: #6e6e73; }
        .mastery-mastered { background: rgba(52,199,89,0.15); color: #34c759; }
        .mastery-proficient { background: rgba(175,82,222,0.15); color: #af52de; }
        .mastery-expert { background: rgba(0,113,227,0.15); color: #0071e3; }
        .section { margin-bottom: 16px; }
        .section-title { font-size: 0.8em; color: #6e6e73; font-weight: 600; margin-bottom: 8px; }
        .word-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .word-input { padding: 12px 14px; border: 2px solid #e0e0e8; border-radius: 10px; font-size: 1em; transition: all 0.3s; background: white; }
        .word-input:focus { outline: none; border-color: #667eea; }
        .word-input.correct { border-color: #34c759; background: rgba(52,199,89,0.05); }
        .word-input.incorrect { border-color: #ff3b30; background: rgba(255,59,48,0.05); }
        .feedback { padding: 10px 14px; border-radius: 8px; margin-top: 8px; font-size: 0.85em; font-weight: 600; display: none; }
        .feedback.show { display: block; }
        .feedback.success { background: rgba(52,199,89,0.1); color: #34c759; }
        .feedback.error { background: rgba(255,59,48,0.1); color: #ff3b30; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: inherit; margin-right: 8px; margin-bottom: 8px; transition: all 0.3s; font-size: 0.9em; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: #34c759; color: white; }
        .btn-danger { background: #ff3b30; color: white; }
        .btn-secondary { background: #f0f0f5; color: #1d1d1f; border: 2px solid #e0e0e8; }
        .btn-small { padding: 8px 14px; font-size: 0.85em; }
        .btn-block { width: 100%; margin-right: 0; }
        .reference { background: #f8f9ff; border-radius: 12px; padding: 16px; margin-top: 16px; display: none; }
        .reference.show { display: block; }
        .reference-item { margin-bottom: 12px; }
        .reference-label { font-size: 0.75em; color: #6e6e73; font-weight: 600; margin-bottom: 6px; }
        .reference-content { display: flex; flex-wrap: wrap; gap: 6px; }
        .reference-tag { background: white; padding: 4px 10px; border-radius: 6px; border: 1px solid #e0e0e8; font-size: 0.85em; }
        .reference-example { background: white; padding: 12px; border-radius: 8px; border-left: 3px solid #667eea; margin-top: 8px; }
        .wrong-count { background: #ff3b30; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7em; font-weight: 700; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 24px; max-width: 100%; width: 100%; padding: 32px 24px; text-align: center; }
        .modal h2 { font-size: 1.5em; margin-bottom: 16px; color: #667eea; }
        .modal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .modal-stat { background: #f8f9ff; padding: 12px; border-radius: 12px; }
        .modal-stat-value { font-size: 1.5em; font-weight: 700; color: #667eea; }
        .modal-stat-label { font-size: 0.7em; color: #6e6e73; margin-top: 4px; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e0e0e8; padding: 12px; display: flex; gap: 8px; justify-content: center; z-index: 999; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } .dashboard { grid-template-columns: repeat(4, 1fr); } }

        <div class="tabs">

            <div class="tab" onclick="switchTab('wrong')">❌ 错字</div>
            <div class="tab" onclick="switchTab('learned')">✅ 已掌握</div>
            <div class="tab" onclick="switchTab('all')">📖 全部</div>

        <div class="grid" id="cardsGrid"></div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-primary btn-block" onclick="completeToday()">✅ 完成打卡</button>
        <button class="btn btn-secondary" onclick="addMoreWords()">➕</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">

                </div>
            </div>
            <button class="btn btn-primary btn-block" onclick="closeModal()">好的，明天见</button>
        </div>
    </div>

        var ALL_CHARS = Object.keys(CHARACTER_DATA);
        var appState = {
            todayWords: [],
            learnedWords: [],
            wrongWords: [],
            masteryLevel: {},
            streak: 0,
            lastStudyDate: null,
            totalDays: 0,
            checkInCompleted: false
        };
        var currentTab = 'today';

        function init() {
            loadState();
            checkNewDay();
            updateDashboard();
            renderCards();
            updateStats();
        }

        function loadState() {
            try {
                var saved = localStorage.getItem('grade6Characters_iPhone');
                if (saved) {
                    appState = JSON.parse(saved);
                }
            } catch (e) {}
        }

        function saveState() {
            try {
                localStorage.setItem('grade6Characters_iPhone', JSON.stringify(appState));
                updateDashboard();
            } catch (e) {}
        }

        function checkNewDay() {
            var today = new Date().toDateString();
            if (appState.lastStudyDate !== today) {
                if (!appState.checkInCompleted && appState.lastStudyDate) {
                    var yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    if (appState.lastStudyDate !== yesterday.toDateString()) {
                        appState.streak = 0;
                    }
                }
                generateTodayWords();
                appState.checkInCompleted = false;
            } else {
                if (appState.todayWords.length === 0) {
                    generateTodayWords();
                }
            }
        }

        function generateTodayWords() {
            var wrongChars = appState.wrongWords.slice(0, 5).map(function(w) { return w.char; });
            var remaining = 20 - wrongChars.length;
            var available = ALL_CHARS.filter(function(c) {
                return appState.learnedWords.indexOf(c) === -1 && wrongChars.indexOf(c) === -1;
            });
            available.sort(function() { return Math.random() - 0.5; });
            var newChars = available.slice(0, remaining);
            appState.todayWords = wrongChars.concat(newChars);
            saveState();
        }

        function switchTab(tab) {
            currentTab = tab;
            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            document.querySelector('.tab[onclick="switchTab(\'' + tab + '\')"]').classList.add('active');
            renderCards();
        }

        function renderCards() {
            var grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            var chars = [];
            if (currentTab === 'today') {
                chars = appState.todayWords;
            } else if (currentTab === 'wrong') {
                chars = appState.wrongWords.map(function(w) { return w.char; });
            } else if (currentTab === 'learned') {
                chars = appState.learnedWords;
            } else {
                chars = ALL_CHARS;
            }
            if (chars.length === 0) {
                var msg = currentTab === 'learned' ? '📭 还没有掌握的字，继续加油！' : '📭 暂无内容';
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #6e6e73;">' + msg + '</div>';
                return;
            }
            for (var i = 0; i < chars.length; i++) {
                var card = createCard(chars[i], i);
                grid.appendChild(card);
            }
        }

        function createCard(char, index) {
            var card = document.createElement('div');
            card.className = 'card';
            var details = CHARACTER_DATA[char] || { words: [], sentence: '' };
            var mastery = appState.masteryLevel[char] || 'new';
            var masteryLabels = { new: '新学', mastered: '掌握', proficient: '熟练', expert: '精通' };
            var wrongInfo = null;
            for (var i = 0; i < appState.wrongWords.length; i++) {
                if (appState.wrongWords[i].char === char) {
                    wrongInfo = appState.wrongWords[i];
                    break;
                }
            }
            var wrongCount = wrongInfo ? wrongInfo.count : 0;
            var wordsHtml = '';
            for (var j = 0; j < details.words.length; j++) {
                wordsHtml += '<span class="reference-tag">' + details.words[j] + '</span>';
            }
            card.innerHTML = '<div class="char-header">' +
                '<div class="char-hanzi">' + char + '</div>' +
                (wrongCount > 0 ? '<span class="wrong-count">错' + wrongCount + '次</span>' : '') +
                '<div class="mastery-badge mastery-' + mastery + '">' + masteryLabels[mastery] + '</div>' +
                '</div>' +
                '<div class="section">' +
                '<div class="section-title">✍️ 自主组词（输入 3 个）</div>' +
                '<div class="word-inputs" id="wordInputs_' + index + '">' +
                '<input type="text" class="word-input" placeholder="输入词语 1" data-char="' + char + '">' +
                '<input type="text" class="word-input" placeholder="输入词语 2" data-char="' + char + '">' +
                '<input type="text" class="word-input" placeholder="输入词语 3" data-char="' + char + '">' +
                '</div>' +
                '<div class="feedback" id="feedback_' + index + '"></div>' +
                '<div>' +
                '<button class="btn btn-primary btn-small" onclick="checkWords(' + index + ', \'' + char + '\')">判断对错</button>' +
                '<button class="btn btn-secondary btn-small" onclick="toggleReference(' + index + ')">参考答案</button>' +
                '</div>' +
                '</div>' +
                '<div class="reference" id="reference_' + index + '">' +
                (details.words.length > 0 ? '<div class="reference-item"><div class="reference-label">📖 参考组词</div><div class="reference-content">' + wordsHtml + '</div></div>' : '') +
                '<div class="reference-item"><div class="reference-label">💬 造句</div><div class="reference-example">' + details.sentence + '</div></div>' +
                '</div>' +
                '<div style="margin-top: 16px;">' +
                '<button class="btn btn-danger btn-small" onclick="markWord(\'' + char + '\', \'wrong\')">❌ 不会</button>' +
                '<button class="btn btn-success btn-small" onclick="markWord(\'' + char + '\', \'mastered\')">✅ 掌握</button>' +
                '<button class="btn btn-primary btn-small" onclick="markWord(\'' + char + '\', \'expert\')">⭐ 精通</button>' +
                '</div>';
            return card;
        }

        function checkWords(index, char) {
            var inputs = document.querySelectorAll('#wordInputs_' + index + ' .word-input');
            var feedback = document.getElementById('feedback_' + index);
            var correctCount = 0;
            var hasError = false;
            var filledCount = 0;
            for (var i = 0; i < inputs.length; i++) {
                var value = inputs[i].value.trim();
                if (value) {
                    filledCount++;
                    if (value.indexOf(char) !== -1) {
                        inputs[i].classList.add('correct');
                        inputs[i].classList.remove('incorrect');
                        correctCount++;
                    } else {
                        inputs[i].classList.add('incorrect');
                        inputs[i].classList.remove('correct');
                        hasError = true;
                    }
                }
            }
            feedback.classList.remove('success', 'error');
            feedback.classList.add('show');
            if (correctCount >= 3 && !hasError && filledCount >= 3) {
                feedback.classList.add('success');
                feedback.textContent = '✓ 全部正确！已自动掌握';
                markWord(char, 'mastered');
            } else if (hasError) {
                feedback.classList.add('error');
                feedback.textContent = '✗ 组词中需要包含该汉字';
            } else {
                feedback.classList.add('error');
                feedback.textContent = '✗ 需要 3 个正确的组词（当前：' + correctCount + '个）';
            }
        }

        function toggleReference(index) {
            var ref = document.getElementById('reference_' + index);
            ref.classList.toggle('show');
        }

        function markWord(char, status) {
            if (status === 'wrong') {
                appState.masteryLevel[char] = 'new';
                var existing = null;
                for (var i = 0; i < appState.wrongWords.length; i++) {
                    if (appState.wrongWords[i].char === char) {
                        existing = appState.wrongWords[i];
                        break;
                    }
                }
                if (existing) {
                    existing.count++;
                } else {
                    appState.wrongWords.push({ char: char, count: 1 });
                }
            } else {
                appState.masteryLevel[char] = status;
                if (appState.learnedWords.indexOf(char) === -1) {
                    appState.learnedWords.push(char);
                }
                var newWrong = [];
                for (var j = 0; j < appState.wrongWords.length; j++) {
                    if (appState.wrongWords[j].char !== char) {
                        newWrong.push(appState.wrongWords[j]);
                    }
                }
                appState.wrongWords = newWrong;
            }
            saveState();
            renderCards();
            updateDashboard();
        }

        function updateDashboard() {
            document.getElementById('totalLearned').textContent = appState.learnedWords.length;
            document.getElementById('wrongCount').textContent = appState.wrongWords.length;
            document.getElementById('masteredCount').textContent = Object.keys(appState.masteryLevel).filter(function(k) { return appState.masteryLevel[k] === 'mastered' || appState.masteryLevel[k] === 'expert'; }).length;
            document.getElementById('daysCount').textContent = appState.totalDays;
            document.getElementById('streakDisplay').textContent = appState.streak;
        }

        function updateStats() {
            var completed = 0;
            for (var i = 0; i < appState.todayWords.length; i++) {
                var c = appState.todayWords[i];
                if (appState.masteryLevel[c] === 'mastered' || appState.masteryLevel[c] === 'expert') {
                    completed++;
                }
            }
            document.getElementById('todayDisplay').textContent = completed + '/' + appState.todayWords.length;
        }

        function completeToday() {
            var completed = 0;
            for (var i = 0; i < appState.todayWords.length; i++) {
                var c = appState.todayWords[i];
                if (appState.masteryLevel[c] === 'mastered' || appState.masteryLevel[c] === 'expert') {
                    completed++;
                }
            }
            if (completed < appState.todayWords.length) {
                alert('请完成所有' + appState.todayWords.length + '个字的学习后再打卡！\n当前进度：' + completed + '/' + appState.todayWords.length);
                return;
            }
            var today = new Date().toDateString();
            if (appState.lastStudyDate !== today) {
                var yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (appState.lastStudyDate === yesterday.toDateString()) {
                    appState.streak++;
                } else {
                    appState.streak = 1;
                }
                appState.lastStudyDate = today;
                appState.totalDays++;
                appState.checkInCompleted = true;
                saveState();
            }
            document.getElementById('modalToday').textContent = appState.todayWords.length;
            document.getElementById('modalTotal').textContent = appState.learnedWords.length;
            document.getElementById('modalStreak').textContent = appState.streak;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function addMoreWords() {
            var available = ALL_CHARS.filter(function(c) { return appState.todayWords.indexOf(c) === -1; });
            available.sort(function() { return Math.random() - 0.5; });
            var newChars = available.slice(0, 5);
            appState.todayWords = appState.todayWords.concat(newChars);
            saveState();
            renderCards();
            updateStats();
        }

        window.onload = init;
    </script>
</body>
</html>
